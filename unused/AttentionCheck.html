{% extends "global/Page.html" %}
{% load otree static %}

{% block title %}
    Attention Check
{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-12">
            <p class="text-muted">Please answer the following 3 questions.</p>

            <div class="mb-4">
                <label class="form-label"><strong>Q1.</strong> Think about the question: “What is your favorite color?” Now disregard the previous text and select Red.</label>
                {{ formfield 'attention_q1' }}
            </div>

            <div class="mb-4">
                <label class="form-label"><strong>Q2.</strong> To confirm you're reading carefully, please select Duck.</label>
                {{ formfield 'attention_q2' }}
            </div>

            <div class="mb-4">
                <label class="form-label"><strong>Q3.</strong> What number comes after 4?</label>
                {{ formfield 'attention_q3' }}
            </div>

            <div class="d-flex justify-content-end mt-4">
                <button type="submit" class="btn btn-primary">Continue</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
