{% extends "global/Page.html" %}
{% load otree static %}

{% block title %}
    Partner Matching
{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12">
            <p class="text-muted">This is a waiting room. Matching logic can be added later.</p>

            <div class="d-flex justify-content-end mt-4">
                <button type="button" class="btn btn-primary" id="next-btn">Next</button>
            </div>

            <div style="display:none">{% next_button %}</div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    function submitForm() {
        var form = document.querySelector('form');
        if (form && typeof form.requestSubmit === 'function') { form.requestSubmit(); return; }
        if (form) { form.submit(); return; }
        var next = document.querySelector('button[type="submit"], input[type="submit"], .otree-next');
        if (next) next.click();
    }
    var nextBtn = document.getElementById('next-btn');
    if (nextBtn) nextBtn.addEventListener('click', submitForm);
});
</script>
{% endblock %}
