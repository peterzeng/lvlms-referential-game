{% extends "otree/WaitPage.html" %}
{% load otree static %}

{% block global_scripts %}
<script>
(function() {
    function isWaitingRoom() {
        try {
            var titleEl = document.querySelector('h1, .otree-title, .otree-title h1');
            var title = (titleEl && (titleEl.textContent || '')).trim().toLowerCase();
            if (title.indexOf('waiting room') !== -1) return true;
            var bodyText = (document.body && document.body.innerText || '').toLowerCase();
            if (bodyText.indexOf('please wait until another participant joins') !== -1) return true;
        } catch (e) {}
        return false;
    }

    function ensureStyles() {
        if (document.getElementById('minute-progress-style')) return;
        var css = '#minute-progress-wrap{max-width:900px;margin:12px auto 0 auto;padding:12px 16px;background:#ffffff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.06)}#minute-progress-track{width:100%;height:12px;background:#e9ecef;border-radius:8px;overflow:hidden}#minute-progress-bar{height:100%;width:0;background:linear-gradient(90deg,#0d6efd,#4dabf7);border-radius:8px}#minute-progress-note{margin:8px 0 0 0;font:14px/1.35 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#495057}#prolific-return-btn{margin-top:10px;background:#0d6efd;color:#fff;border:0;border-radius:8px;padding:8px 12px;font:14px/1.2 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;cursor:pointer;display:none}#prolific-return-btn:disabled{opacity:.7;cursor:default}';
        var style = document.createElement('style');
        style.id = 'minute-progress-style';
        style.textContent = css;
        document.head.appendChild(style);
    }

    function hideDefaultProgressBars() {
        try {
            var selectors = [
                '.progress',
                '.otree-progressbar',
                '.otree-progress-bar',
                '.otree-wait-page .progress',
                '.wait-page__progress',
                '.otree-progress'
            ];
            selectors.forEach(function(sel) {
                document.querySelectorAll(sel).forEach(function(el){
                    el.style.display = 'none';
                    el.setAttribute('aria-hidden', 'true');
                });
            });
        } catch (e) {}
    }

    function insertProgressBar() {
        if (!isWaitingRoom()) return;
        if (document.getElementById('minute-progress-wrap')) return;
        ensureStyles();
        hideDefaultProgressBars();

        var wrap = document.createElement('div');
        wrap.id = 'minute-progress-wrap';

        var track = document.createElement('div');
        track.id = 'minute-progress-track';

        var bar = document.createElement('div');
        bar.id = 'minute-progress-bar';
        track.appendChild(bar);

        var note = document.createElement('div');
        note.id = 'minute-progress-note';
        note.textContent = 'Loading… This bar fills over 60 seconds and then restarts.';

        var btn = document.createElement('button');
        btn.id = 'prolific-return-btn';
        btn.type = 'button';
        btn.textContent = 'Go Back to Prolific';
        btn.addEventListener('click', function() {
            console.log('Prolific return button clicked');
        });

        wrap.appendChild(track);
        wrap.appendChild(note);
        wrap.appendChild(btn);

        var anchor = document.querySelector('.otree-body, .container, main, .otree-wait-page, body');
        if (anchor && anchor.firstElementChild) {
            anchor.insertBefore(wrap, anchor.firstElementChild.nextSibling);
        } else if (anchor) {
            anchor.appendChild(wrap);
        } else {
            document.body.appendChild(wrap);
        }

        var startEpoch = Date.now();
        var buttonShown = false;
        function tick() {
            var elapsed = Date.now() - startEpoch;
            var cycleMs = 60000;
            var inCycle = elapsed % cycleMs;
            var pct = Math.max(0, Math.min(100, (inCycle / cycleMs) * 100));
            bar.style.width = pct + '%';
            if (!buttonShown && elapsed >= cycleMs) {
                buttonShown = true;
                btn.style.display = 'inline-block';
            }
            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
    }

    document.addEventListener('DOMContentLoaded', insertProgressBar);
})();
</script>
{% endblock %}
